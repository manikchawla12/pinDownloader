<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinClip Admin — Blog Manager</title>
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="icon" type="image/png" href="/favicon.png">

    <style>
        :root {
            --admin-primary: #e60023;
            --admin-dark: #111;
            --admin-card: #fff;
            --admin-bg: #f9fafb;
            --admin-border: #e5e7eb;
            --admin-success: #16a34a;
        }

        .admin-container {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Login Screen */
        .login-card {
            max-width: 420px;
            margin: 4rem auto;
            background: var(--admin-card);
            border-radius: 1rem;
            padding: 2.5rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            border: 1px solid var(--admin-border);
        }

        .login-card h2 {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--admin-dark);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.375rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid var(--admin-border);
            border-radius: 0.5rem;
            font-size: 0.9375rem;
            font-family: 'Inter', sans-serif;
            transition: border 0.2s;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--admin-primary);
            box-shadow: 0 0 0 3px rgba(230, 0, 35, 0.08);
        }

        .form-textarea {
            min-height: 260px;
            resize: vertical;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.625rem 1.25rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.15s;
        }

        .btn-red {
            background: var(--admin-primary);
            color: #fff;
        }
        .btn-red:hover { background: #ad081b; }

        .btn-gray {
            background: #f3f4f6;
            color: #374151;
            border: 1px solid var(--admin-border);
        }
        .btn-gray:hover { background: #e5e7eb; }

        .btn-danger {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        .btn-danger:hover { background: #fecaca; }

        .btn-block { width: 100%; }

        /* Dashboard */
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .dash-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--admin-dark);
        }

        .post-card {
            background: var(--admin-card);
            border: 1px solid var(--admin-border);
            border-radius: 0.75rem;
            padding: 1.25rem;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            transition: box-shadow 0.2s;
        }

        .post-card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .post-info h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--admin-dark);
            margin-bottom: 0.25rem;
        }

        .post-info .meta {
            font-size: 0.8125rem;
            color: #6b7280;
        }

        .post-actions {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .badge {
            display: inline-block;
            padding: 0.125rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-green { background: #dcfce7; color: #16a34a; }
        .badge-gray { background: #f3f4f6; color: #6b7280; }

        .editor-card {
            background: var(--admin-card);
            border: 1px solid var(--admin-border);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .editor-card h2 {
            font-size: 1.375rem;
            font-weight: 700;
            color: var(--admin-dark);
            margin-bottom: 1.5rem;
        }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .alert-error { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .alert-success { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #9ca3af;
        }

        .empty-state svg {
            width: 3rem;
            height: 3rem;
            margin: 0 auto 1rem;
        }

        .topbar {
            background: var(--admin-dark);
            color: #fff;
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar a {
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.125rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .topbar button {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.8125rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background 0.15s;
        }

        .topbar button:hover { background: rgba(255,255,255,0.2); }

        .hidden { display: none !important; }

        .content-help {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body style="background: var(--admin-bg); font-family: 'Inter', sans-serif; margin: 0;">

    <!-- ──── Login Screen ──── -->
    <div id="loginScreen">
        <div class="login-card">
            <div style="text-align:center; margin-bottom: 1rem;">
                <img src="/favicon.png" alt="PinClip" style="width:48px; height:48px; border-radius:8px; margin:0 auto;">
            </div>
            <h2>Admin Login</h2>
            <div id="loginError" class="alert alert-error hidden"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginUser">Username</label>
                    <input type="text" id="loginUser" class="form-input" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="loginPass">Password</label>
                    <input type="password" id="loginPass" class="form-input" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-red btn-block" style="margin-top:0.5rem;">Sign In</button>
            </form>
        </div>
    </div>

    <!-- ──── Dashboard ──── -->
    <div id="dashboardScreen" class="hidden">
        <div class="topbar">
            <a href="/">
                <img src="/favicon.png" alt="PinClip" style="width:24px; height:24px; border-radius:4px;">
                PinClip Admin
            </a>
            <div style="display:flex; gap:0.5rem; align-items:center;">
                <a href="/" style="font-size:0.8125rem; font-weight:400; opacity:0.7;">← Back to site</a>
                <button id="logoutBtn">Logout</button>
            </div>
        </div>

        <div class="admin-container">
            <!-- Dashboard View -->
            <div id="dashView">
                <div class="dash-header">
                    <h1>Blog Posts</h1>
                    <button class="btn btn-red" id="newPostBtn">+ New Post</button>
                </div>
                <div id="dashAlert"></div>
                <div id="postsList"></div>
            </div>

            <!-- Editor View -->
            <div id="editorView" class="hidden">
                <div class="editor-card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                        <h2 id="editorTitle">New Post</h2>
                        <button class="btn btn-gray" id="backToDash">← Back</button>
                    </div>
                    <div id="editorAlert"></div>
                    <form id="postForm">
                        <div class="form-group">
                            <label for="postTitle">Title</label>
                            <input type="text" id="postTitle" class="form-input" required placeholder="E.g. How to Download Pinterest Videos (2026)">
                        </div>
                        <div class="form-group">
                            <label for="postExcerpt">Excerpt</label>
                            <input type="text" id="postExcerpt" class="form-input" placeholder="Short description (auto-generated if blank)">
                        </div>
                        <div class="form-group">
                            <label for="postCover">Cover Image URL</label>
                            <input type="url" id="postCover" class="form-input" placeholder="https://images.unsplash.com/...">
                        </div>
                        <div class="form-group">
                            <label for="postContent">Content (HTML)</label>
                            <textarea id="postContent" class="form-input form-textarea" required placeholder="Write your blog post content in HTML..."></textarea>
                            <p class="content-help">Supports HTML. Use &lt;h2&gt;, &lt;p&gt;, &lt;ul&gt;, &lt;strong&gt; etc.</p>
                        </div>
                        <div class="form-group" style="display:flex; align-items:center; gap:0.5rem;">
                            <input type="checkbox" id="postPublished" checked>
                            <label for="postPublished" style="margin:0;">Publish immediately</label>
                        </div>
                        <div style="display:flex; gap:0.75rem; margin-top:1rem;">
                            <button type="submit" class="btn btn-red" id="saveBtn">Save Post</button>
                            <button type="button" class="btn btn-gray" id="cancelBtn">Cancel</button>
                        </div>
                        <input type="hidden" id="editSlug" value="">
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:8000'
            : 'https://pindownloader-gvif.onrender.com';

        let authToken = localStorage.getItem('pinclip_admin_token') || '';

        // ──── Elements ────
        const loginScreen = document.getElementById('loginScreen');
        const dashboardScreen = document.getElementById('dashboardScreen');
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');
        const newPostBtn = document.getElementById('newPostBtn');
        const backToDash = document.getElementById('backToDash');
        const cancelBtn = document.getElementById('cancelBtn');
        const dashView = document.getElementById('dashView');
        const editorView = document.getElementById('editorView');
        const postForm = document.getElementById('postForm');
        const postsList = document.getElementById('postsList');
        const dashAlert = document.getElementById('dashAlert');
        const editorAlert = document.getElementById('editorAlert');

        // ──── Auth ────
        async function verifyToken() {
            if (!authToken) return false;
            try {
                const res = await fetch(`${API_BASE}/api/admin/verify`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                return res.ok;
            } catch { return false; }
        }

        async function init() {
            if (await verifyToken()) {
                showDashboard();
            } else {
                authToken = '';
                localStorage.removeItem('pinclip_admin_token');
                showLogin();
            }
        }

        function showLogin() {
            loginScreen.classList.remove('hidden');
            dashboardScreen.classList.add('hidden');
        }

        function showDashboard() {
            loginScreen.classList.add('hidden');
            dashboardScreen.classList.remove('hidden');
            loadPosts();
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginError.classList.add('hidden');
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;

            try {
                const res = await fetch(`${API_BASE}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Login failed');
                authToken = data.token;
                localStorage.setItem('pinclip_admin_token', authToken);
                showDashboard();
            } catch (err) {
                loginError.textContent = err.message;
                loginError.classList.remove('hidden');
            }
        });

        logoutBtn.addEventListener('click', () => {
            authToken = '';
            localStorage.removeItem('pinclip_admin_token');
            showLogin();
        });

        // ──── Posts List ────
        async function loadPosts() {
            postsList.innerHTML = '<p style="text-align:center; color:#9ca3af;">Loading...</p>';
            try {
                const res = await fetch(`${API_BASE}/api/blog`);
                const data = await res.json();

                if (!data.posts || data.posts.length === 0) {
                    postsList.innerHTML = `
                        <div class="empty-state">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
                            <p>No blog posts yet.</p>
                            <p style="font-size:0.8125rem;">Click <strong>"+ New Post"</strong> to create your first article.</p>
                        </div>`;
                    return;
                }

                postsList.innerHTML = data.posts.map(p => `
                    <div class="post-card">
                        <div class="post-info">
                            <h3>${escapeHtml(p.title)}</h3>
                            <div class="meta">
                                <span class="badge ${p.published !== false ? 'badge-green' : 'badge-gray'}">${p.published !== false ? 'Published' : 'Draft'}</span>
                                &middot; ${new Date(p.created_at).toLocaleDateString()}
                                &middot; /${p.slug}
                            </div>
                        </div>
                        <div class="post-actions">
                            <button class="btn btn-gray" onclick="adminApp.editPost('${p.slug}')">Edit</button>
                            <button class="btn btn-danger" onclick="adminApp.deletePost('${p.slug}')">Delete</button>
                        </div>
                    </div>`
                ).join('');
            } catch (err) {
                postsList.innerHTML = `<div class="alert alert-error">Failed to load posts: ${err.message}</div>`;
            }
        }

        // ──── Editor ────
        function showEditor(post = null) {
            dashView.classList.add('hidden');
            editorView.classList.remove('hidden');
            editorAlert.innerHTML = '';

            if (post) {
                document.getElementById('editorTitle').textContent = 'Edit Post';
                document.getElementById('postTitle').value = post.title || '';
                document.getElementById('postExcerpt').value = post.excerpt || '';
                document.getElementById('postCover').value = post.cover_image || '';
                document.getElementById('postContent').value = post.content || '';
                document.getElementById('postPublished').checked = post.published !== false;
                document.getElementById('editSlug').value = post.slug;
            } else {
                document.getElementById('editorTitle').textContent = 'New Post';
                postForm.reset();
                document.getElementById('postPublished').checked = true;
                document.getElementById('editSlug').value = '';
            }
        }

        function showDashView() {
            editorView.classList.add('hidden');
            dashView.classList.remove('hidden');
            loadPosts();
        }

        newPostBtn.addEventListener('click', () => showEditor());
        backToDash.addEventListener('click', showDashView);
        cancelBtn.addEventListener('click', showDashView);

        postForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            editorAlert.innerHTML = '';
            const slug = document.getElementById('editSlug').value;
            const body = {
                title: document.getElementById('postTitle').value,
                excerpt: document.getElementById('postExcerpt').value,
                cover_image: document.getElementById('postCover').value,
                content: document.getElementById('postContent').value,
                published: document.getElementById('postPublished').checked,
            };

            const isEdit = !!slug;
            const url = isEdit ? `${API_BASE}/api/admin/blog/${slug}` : `${API_BASE}/api/admin/blog`;
            const method = isEdit ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Save failed');

                dashAlert.innerHTML = `<div class="alert alert-success">Post "${escapeHtml(body.title)}" ${isEdit ? 'updated' : 'created'} successfully!</div>`;
                showDashView();
            } catch (err) {
                editorAlert.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
            }
        });

        // ──── Actions ────
        async function editPost(slug) {
            try {
                const res = await fetch(`${API_BASE}/api/blog/${slug}`);
                const post = await res.json();
                if (!res.ok) throw new Error('Post not found');
                showEditor(post);
            } catch (err) {
                dashAlert.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
            }
        }

        async function deletePost(slug) {
            if (!confirm(`Delete post "${slug}"? This cannot be undone.`)) return;
            try {
                const res = await fetch(`${API_BASE}/api/admin/blog/${slug}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                if (!res.ok) throw new Error('Delete failed');
                dashAlert.innerHTML = `<div class="alert alert-success">Post deleted.</div>`;
                loadPosts();
            } catch (err) {
                dashAlert.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Expose to global scope for onclick handlers
        window.adminApp = { editPost, deletePost };

        // Start
        init();
    })();
    </script>
</body>
</html>
